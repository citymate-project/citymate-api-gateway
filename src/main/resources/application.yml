# ============================================
# CITYMATE API GATEWAY - Configuration
# ============================================

# ============================================
# SERVER CONFIGURATION
# ============================================
server:
  port: 8090

  jwt:
    secret: VotreCleSecreteTresFortePourLaProductionChangezMoiAbsolument123456789

spring:
  application:
    name: citymate-api-gateway

  # ============================================
  # GATEWAY CONFIGURATION
  # ============================================
  cloud:
    gateway:
      # ============================================
      # ROUTES
      # ============================================
      routes:
        # USER API
        - id: user-api
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**, /api/v1/users/**
          filters:
            - StripPrefix=0

      # ============================================
      # CORS CONFIGURATION
      # ============================================
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns:
              - "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
            maxAge: 3600

# ============================================
# ACTUATOR
# ============================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always

# ============================================
# LOGGING
# ============================================
logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG